<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thread Board</title>

<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>

<style>
  
 #gate-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.gate-box {
  text-align:center;
  color:#00FF00;
  font-size:20px;
}

.gate-buttons {
  margin-top:20px;
  display:flex;
  gap:20px;
  justify-content:center;
}

.gate-buttons button {
  background:#000;
  border:2px solid #00FF00;
  color:#00FF00;
  padding:10px 20px;
  cursor:pointer;
}

.gate-buttons button:hover {
  background:#00FF00;
  color:#000;
}



  /* ページ全体の余白をリセット */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "MS UI Gothic", "Comic Sans MS", sans-serif;
      color: #FFFF00;
      overflow-x: hidden;
    }

    /* 星空用キャンバスを背景に配置 */
    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at bottom, #000 0%, #000010 100%);
      z-index: -3;
    }

    /* 星のきらめき */
    .star {
      position: absolute;
      background: white;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      opacity: 0.8;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.3; }
      to { opacity: 1; }
    }

    /* 月のアニメーション */
    #moon {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, #FFD84D 70%, #C6A200 100%);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255, 216, 77, 0.8);
      animation: orbit 60s linear infinite;
      transform-origin: -200px center; /* 公転の中心 */
      z-index: -2;
    }

    @keyframes orbit {
      0% { transform: rotate(0deg) translateX(200px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(200px) rotate(-360deg); }

    }



body {
  margin: 0;
  background-color: #000;
  color: #00FF00;
  font-family: 'Kosugi Maru', sans-serif;
}



/* ===== Windows95風 ===== */
.windows95-featured {
  width: 90%;
  max-width: 700px;
  margin: 40px auto;
  background: #000;
  border: 2px solid #FFF;
  border-right-color: #808080;
  border-bottom-color: #808080;
  box-shadow: inset 2px 2px 0 #FFF, inset -2px -2px 0 #808080;
}

.windows95-title {
  background: #000080;
  color: #FFFF00;
  font-weight: bold;
  padding: 5px 10px;
  border-bottom: 2px solid #808080;
}

.windows95-content {
  padding: 10px;
}

/* ===== チャット ===== */
#messages {
  height: 400px;
  overflow-y: auto;
  background: #000;
  border: 1px solid #555;
  padding: 5px;
}

.post {
  padding: 6px;
  border-bottom: 1px dashed #555;
  margin-left: 10px;
}

.meta {
  font-size: 11px;
  color: #666;
  cursor: pointer;
}

.text {
  color: #00FF00;
  white-space: pre-wrap;
}

.children {
  margin-left: 20px;
  border-left: 1px dotted #555;
  padding-left: 10px;
}

/* ===== 入力 ===== */
input, textarea {
  width: 100%;
  margin-top: 5px;
  background: #111;
  border: 1px solid #555;
  color: #00FF00;
}

textarea {
  height: 100px;
  resize: none;
}

button {
  margin-top: 5px;
  background: #00FFFF;
  color: #000;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
}

.time {
  font-size: 11px;
  color: #666;
}
</style>
</head>

<body>
<div id="gate-screen">
  <div class="gate-box">
    <p>展示は鑑賞しましたか？</p>
    <div class="gate-buttons">
      <button id="seen-btn">見た</button>
      <button id="not-seen-btn">見ていない</button>
    </div>
  </div>
</div>

<div class="windows95-featured">
  <div class="windows95-title">💬 各々が書き込め-展示感想チャット-</div>

  <div class="windows95-content">

    <div id="messages"></div>

    <div id="replyBox"></div>
    <button onclick="clearReply()">返信キャンセル</button>

    <input id="name" placeholder="名前（空なら匿名）">
    <textarea id="text" placeholder="書き込み..."></textarea>
    <button onclick="send()">送信</button>

  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDcBai370Y89SP6RdP0AEjPO6tZLBa739E",
    authDomain: "onoonogamaware.firebaseapp.com",
    projectId: "onoonogamaware",
    storageBucket: "onoonogamaware.firebasestorage.app",
    messagingSenderId: "901688748320",
    appId: "1:901688748320:web:433e08cb0670e883d44f45"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const messages = document.getElementById("messages");

  let replyTarget = null;

  // ===== 受信 =====
  db.collection("messages")
    .orderBy("created")
    .onSnapshot(snapshot => {
      const data = [];

      snapshot.forEach(doc => {
        data.push({ id: doc.id, ...doc.data() });
      });

      messages.innerHTML = "";

      const roots = data.filter(m => !m.parentId);

      roots.forEach(root => {
        messages.appendChild(renderThread(root, data));
      });
    });

  // ===== ツリー =====
  function renderThread(node, all) {
    const wrapper = document.createElement("div");

    const div = document.createElement("div");
    div.className = "post";

    const date = node.created?.toDate
      ? node.created.toDate().toLocaleString()
      : "読み込み中...";

    div.innerHTML = `
      <div class="meta" onclick="setReply('${node.id}', '${node.user}')">
        @${node.user} ・ ${date}
      </div>
      <div class="text">${node.text}</div>
    `;

    wrapper.appendChild(div);

    const children = all.filter(m => m.parentId === node.id);

    if (children.length > 0) {
      const childBox = document.createElement("div");
      childBox.className = "children";

      children.forEach(c => {
        childBox.appendChild(renderThread(c, all));
      });

      wrapper.appendChild(childBox);
    }

    return wrapper;
  }

  // ===== 返信 =====
  function setReply(id, user) {
    replyTarget = id;
    document.getElementById("replyBox").textContent =
      "返信先: @" + user;
  }

  function clearReply() {
    replyTarget = null;
    document.getElementById("replyBox").textContent = "";
  }

  // ===== 送信 =====
  function send() {
    const name = document.getElementById("name").value.trim();
    const text = document.getElementById("text").value.trim();

    if (!text) return;

    const user =
      name || "匿名_" + Math.random().toString(36).slice(2, 6);

    db.collection("messages").add({
      text,
      user,
      parentId: replyTarget,
      created: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById("text").value = "";
    clearReply();
  }

  const gate = document.getElementById("gate-screen");

document.getElementById("seen-btn").onclick = () => {
  gate.style.display = "none";
};

document.getElementById("not-seen-btn").onclick = () => {
  gate.style.display = "none";

  // 🔒 書き込み禁止モード
  document.getElementById("text").disabled = true;
  document.getElementById("name").disabled = true;

  // 送信ボタン無効
  document.querySelector("button[onclick='send()']").disabled = true;

  // メッセージ表示
  document.getElementById("replyBox").textContent =
    "※鑑賞後に書き込めます（現在は閲覧専用）";
};

</script>

</body>
</html>
